<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'none';
      script-src  'self' https://telegram.org 'unsafe-inline';
      style-src   'self' 'unsafe-inline';
      connect-src 'self';
      img-src     'self' data:;
      frame-src   'none';
      object-src  'none';
    "
    />

    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="no-referrer" />

    <title>Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #fff;
        --surface: #f5f5f5;
        --border: #ddd;
        --text: #000;
        --text-sub: #666;
        --accent: #007bff;
        --danger: #dc3545;
      }

      html,
      body {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        -webkit-tap-highlight-color: transparent;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 500px;
        margin: 0 auto;
      }

      .hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }

      .hdr-back {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        opacity: 0;
        pointer-events: none;
      }
      .hdr-back.on {
        opacity: 1;
        pointer-events: auto;
      }

      .hdr-title {
        font-size: 18px;
        font-weight: 600;
      }
      .hdr-cart {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        position: relative;
      }

      .badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background: var(--danger);
        color: white;
        font-size: 10px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .badge.on {
        display: flex;
      }

      .pages {
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      .pg {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .pg.active {
        opacity: 1;
        pointer-events: auto;
      }

      .home-hero {
        padding: 20px 16px;
        border-bottom: 1px solid var(--border);
      }

      .home-h1 {
        font-size: 24px;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .home-sub {
        font-size: 12px;
        color: var(--text-sub);
      }

      .cat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
      }

      .cat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 16px;
        cursor: pointer;
        text-align: center;
        transition: background 0.15s;
      }
      .cat-card:active {
        background: #eee;
      }

      .cat-ico {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .cat-name {
        font-size: 14px;
        font-weight: 500;
      }
      .cat-nb {
        font-size: 12px;
        color: var(--text-sub);
        margin-top: 4px;
      }

      .list-hdr {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      .list-hdr-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .list-hdr-sub {
        font-size: 12px;
        color: var(--text-sub);
      }

      .prod-list {
        padding: 8px 12px 32px;
      }

      .prod-row {
        display: flex;
        gap: 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 12px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .prod-row:active {
        background: #eee;
      }

      .prod-ico {
        width: 50px;
        height: 50px;
        flex-shrink: 0;
        background: white;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }

      .prod-info {
        flex: 1;
      }
      .prod-name {
        font-size: 14px;
        font-weight: 500;
      }
      .prod-desc-short {
        font-size: 11px;
        color: var(--text-sub);
        margin-top: 2px;
      }
      .prod-foot {
        display: flex;
        gap: 8px;
        margin-top: 4px;
        align-items: center;
      }
      .prod-price {
        font-size: 14px;
        font-weight: 600;
        color: var(--accent);
      }
      .stock-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .stock-dot.in {
        background: #28a745;
      }
      .stock-dot.out {
        background: var(--danger);
      }

      .det-hero {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 24px 16px;
        text-align: center;
      }

      .det-ico {
        font-size: 60px;
        margin-bottom: 8px;
      }
      .det-name {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .det-desc {
        font-size: 13px;
        color: var(--text-sub);
        margin-bottom: 12px;
      }
      .det-price {
        font-size: 22px;
        font-weight: 600;
        color: var(--accent);
      }

      .det-sec {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      .det-sec-lbl {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-sub);
        margin-bottom: 8px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .color-chip {
        font-size: 12px;
        background: white;
        border: 1px solid var(--border);
        padding: 4px 12px;
      }

      .size-chip {
        min-width: 40px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        background: white;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: all 0.15s;
      }
      .size-chip:active {
        background: #eee;
      }
      .size-chip.sel {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      .btn-add {
        display: block;
        margin: 16px;
        width: calc(100% - 32px);
        padding: 12px;
        background: var(--accent);
        color: white;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: background 0.15s;
      }
      .btn-add:active {
        background: #0056b3;
      }
      .btn-add:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .cart-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        text-align: center;
      }

      .cart-empty-ico {
        font-size: 48px;
        margin-bottom: 8px;
      }
      .cart-empty-h {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .cart-empty-sub {
        font-size: 12px;
        color: var(--text-sub);
      }

      .cart-items {
        padding: 8px 12px;
      }

      .cart-row {
        display: flex;
        gap: 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 12px;
        margin-bottom: 8px;
        align-items: center;
      }

      .cart-ico {
        width: 44px;
        height: 44px;
        flex-shrink: 0;
        background: white;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .cart-info {
        flex: 1;
      }
      .cart-name {
        font-size: 13px;
        font-weight: 500;
      }
      .cart-meta {
        font-size: 11px;
        color: var(--text-sub);
        margin-top: 2px;
      }
      .cart-price {
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
      }
      .cart-del {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        color: var(--danger);
      }

      .cart-foot {
        padding: 12px 16px 32px;
        border-top: 1px solid var(--border);
      }

      .cart-total-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .cart-total-lbl {
        font-size: 12px;
        color: var(--text-sub);
      }
      .cart-total-amt {
        font-size: 20px;
        font-weight: 600;
      }

      .btn-clear {
        width: 100%;
        padding: 10px;
        background: transparent;
        border: 1px solid var(--danger);
        color: var(--danger);
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
      }
      .btn-clear:active {
        background: rgba(220, 53, 69, 0.05);
      }

      #toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--text);
        color: white;
        padding: 8px 14px;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
        z-index: 999;
      }
      #toast.on {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .nav {
        display: flex;
        background: var(--surface);
        border-top: 1px solid var(--border);
      }

      .nav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 8px;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 12px;
        color: var(--text-sub);
        transition: color 0.15s;
      }
      .nav-btn.active {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- HEADER -->
      <header class="hdr">
        <button
          class="hdr-back"
          id="btnBack"
          onclick="goBack()"
          aria-label="Retour"
        >
          ←
        </button>
        <div class="hdr-title" id="hdrTitle">Shop</div>
        <button class="hdr-cart" onclick="openCart()" aria-label="Panier">
          🛒
          <span class="badge" id="badge"></span>
        </button>
      </header>

      <!-- PAGES -->
      <div class="pages">
        <!-- ACCUEIL -->
        <div class="pg active" id="pg-home">
          <div class="home-hero">
            <h1 class="home-h1">Boutique</h1>
            <p class="home-sub">Découvrez nos collections</p>
          </div>
          <div class="cat-grid" id="catGrid"></div>
        </div>

        <!-- LISTE -->
        <div class="pg" id="pg-list">
          <div class="list-hdr">
            <div class="list-hdr-title" id="listTitle"></div>
            <div class="list-hdr-sub" id="listSub"></div>
          </div>
          <div class="prod-list" id="prodList"></div>
        </div>

        <!-- DÉTAIL -->
        <div class="pg" id="pg-detail">
          <div class="det-hero">
            <span class="det-ico" id="detIco"></span>
            <div class="det-name" id="detName"></div>
            <div class="det-desc" id="detDesc"></div>
            <div class="det-price" id="detPrice"></div>
          </div>
          <div class="det-sec">
            <div class="det-sec-lbl">Tailles</div>
            <div class="chips" id="sizeChips"></div>
          </div>
          <div class="det-sec">
            <div class="det-sec-lbl">Couleurs</div>
            <div class="chips" id="colorChips"></div>
          </div>
          <button class="btn-add" id="btnAdd" onclick="addToCart()" disabled>
            Sélectionnez une taille
          </button>
        </div>

        <!-- PANIER -->
        <div class="pg" id="pg-cart">
          <div id="cartInner"></div>
        </div>
      </div>

      <!-- NAV -->
      <nav class="nav">
        <button
          class="nav-btn active"
          id="nav-home"
          onclick="goHome()"
          style="border: none; background: none"
        >
          🏠 Accueil
        </button>
        <button
          class="nav-btn"
          id="nav-cart"
          onclick="openCart()"
          style="border: none; background: none"
        >
          🛒 Panier
        </button>
      </nav>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <script>
      let CATALOG = { categories: [] };

      async function loadCatalog() {
        try {
          const response = await fetch("articles.json");
          CATALOG = await response.json();
          renderHome();
        } catch (e) {
          console.error("Erreur chargement articles:", e);
          CATALOG = { categories: [] };
        }
      }

      function getCat(id) {
        return CATALOG.categories.find((c) => c.id === id);
      }
      function getProd(id) {
        for (const c of CATALOG.categories) {
          const p = c.produits.find((p) => p.id === id);
          if (p) return { prod: p, cat: c };
        }
        return null;
      }

      const state = {
        page: "home",
        prevPage: null,
        catId: null,
        prodId: null,
        size: null,
        cart: [],
      };

      const tg = window.Telegram?.WebApp ?? null;
      if (tg) {
        tg.ready();
        tg.expand();
        try {
          tg.setHeaderColor("#ffffff");
        } catch (_) {}
        try {
          tg.setBackgroundColor("#ffffff");
        } catch (_) {}
      }
      function haptic() {
        try {
          tg?.HapticFeedback?.impactOccurred("light");
        } catch (_) {}
      }

      function goto(name) {
        if (name === state.page) return;
        const old = document.getElementById("pg-" + state.page);
        const nxt = document.getElementById("pg-" + name);
        if (!nxt) return;

        old.classList.remove("active");
        nxt.classList.add("active");
        nxt.scrollTop = 0;

        state.prevPage = state.page;
        state.page = name;
        syncHeader();
        syncNav();
      }

      function goBack() {
        if (state.prevPage) goto(state.prevPage);
      }
      function goHome() {
        goto("home");
      }
      function openCart() {
        renderCart();
        goto("cart");
      }

      const PAGE_TITLES = {
        home: "Shop",
        list: "",
        detail: "Article",
        cart: "Panier",
      };

      function syncHeader() {
        const t = PAGE_TITLES[state.page];
        document.getElementById("hdrTitle").textContent =
          state.page === "list"
            ? (getCat(state.catId)?.nom ?? "Collection")
            : t;
        document
          .getElementById("btnBack")
          .classList.toggle("on", state.page !== "home");
      }

      function syncNav() {
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        const map = {
          home: "nav-home",
          list: "nav-home",
          detail: "nav-home",
          cart: "nav-cart",
        };
        document.getElementById(map[state.page])?.classList.add("active");
      }

      function renderHome() {
        const g = document.getElementById("catGrid");
        g.innerHTML = "";
        CATALOG.categories.forEach((cat) => {
          const d = document.createElement("div");
          d.className = "cat-card";
          d.setAttribute("role", "button");
          d.setAttribute("tabindex", "0");
          d.innerHTML =
            `<span class="cat-ico">${escHtml(cat.emoji)}</span>` +
            `<div class="cat-name">${escHtml(cat.nom)}</div>` +
            `<div class="cat-nb">${cat.produits.length} articles</div>`;
          d.onclick = () => openCat(cat.id);
          g.appendChild(d);
        });
      }

      function openCat(id) {
        state.catId = id;
        const cat = getCat(id);
        document.getElementById("listTitle").textContent =
          cat.emoji + " " + cat.nom;
        document.getElementById("listSub").textContent =
          cat.produits.length + " articles";

        const list = document.getElementById("prodList");
        list.innerHTML = "";
        cat.produits.forEach((p) => {
          const d = document.createElement("div");
          d.className = "prod-row";
          d.setAttribute("role", "button");
          d.setAttribute("tabindex", "0");
          d.innerHTML =
            `<div class="prod-ico">${escHtml(cat.emoji)}</div>` +
            `<div class="prod-info">` +
            `<div class="prod-name">${escHtml(p.nom)}</div>` +
            `<div class="prod-desc-short">${escHtml(p.desc)}</div>` +
            `<div class="prod-foot">` +
            `<span class="prod-price">${escHtml(String(p.prix.toFixed(2)))} €</span>` +
            `<span class="stock-dot ${p.stock ? "in" : "out"}"></span>` +
            `</div>` +
            `</div>`;
          d.onclick = () => openProd(p.id);
          list.appendChild(d);
        });

        goto("list");
      }

      function openProd(id) {
        const found = getProd(id);
        if (!found) return;
        const { prod, cat } = found;
        state.prodId = id;
        state.size = null;

        document.getElementById("detIco").textContent = cat.emoji;
        document.getElementById("detName").textContent = prod.nom;
        document.getElementById("detDesc").textContent = prod.desc;
        document.getElementById("detPrice").textContent =
          prod.prix.toFixed(2) + " €";

        const sc = document.getElementById("sizeChips");
        sc.innerHTML = "";
        prod.tailles.forEach((t) => {
          const chip = document.createElement("div");
          chip.className = "size-chip";
          chip.textContent = t;
          chip.setAttribute("role", "button");
          chip.setAttribute("tabindex", "0");
          chip.onclick = () => pickSize(t, chip);
          sc.appendChild(chip);
        });

        const cc = document.getElementById("colorChips");
        cc.innerHTML = "";
        prod.couleurs.forEach((c) => {
          const chip = document.createElement("div");
          chip.className = "color-chip";
          chip.textContent = c;
          cc.appendChild(chip);
        });

        const btn = document.getElementById("btnAdd");
        btn.disabled = true;
        btn.textContent = "Sélectionnez une taille";

        goto("detail");
      }

      function pickSize(size, el) {
        state.size = size;
        document
          .querySelectorAll(".size-chip")
          .forEach((c) => c.classList.remove("sel"));
        el.classList.add("sel");
        const btn = document.getElementById("btnAdd");
        btn.disabled = false;
        btn.textContent = `Ajouter — taille ${size}`;
        haptic();
      }

      function addToCart() {
        if (!state.prodId || !state.size) return;
        const found = getProd(state.prodId);
        if (!found) return;
        const { prod, cat } = found;

        const existing = state.cart.find(
          (i) => i.id === prod.id && i.taille === state.size,
        );
        if (existing) {
          existing.qte++;
        } else {
          state.cart.push({
            id: prod.id,
            nom: prod.nom,
            prix: prod.prix,
            taille: state.size,
            qte: 1,
            emoji: cat.emoji,
          });
        }

        syncBadge();
        haptic();
        toast("✓ " + prod.nom + " ajouté !");
      }

      function removeFromCart(idx) {
        state.cart.splice(idx, 1);
        syncBadge();
        renderCart();
        haptic();
      }

      function clearCart() {
        state.cart = [];
        syncBadge();
        renderCart();
      }

      function cartTotal() {
        return state.cart.reduce((s, i) => s + i.prix * i.qte, 0);
      }

      function syncBadge() {
        const n = state.cart.reduce((s, i) => s + i.qte, 0);
        const b = document.getElementById("badge");
        b.textContent = n;
        b.classList.toggle("on", n > 0);
      }

      function renderCart() {
        const el = document.getElementById("cartInner");

        if (!state.cart.length) {
          el.innerHTML =
            `<div class="cart-empty">` +
            `<div class="cart-empty-ico">🛒</div>` +
            `<div class="cart-empty-h">Panier vide</div>` +
            `<div class="cart-empty-sub">Ajoutez des articles depuis le catalogue</div>` +
            `</div>`;
          return;
        }

        let html = `<div class="cart-items">`;
        state.cart.forEach((item, i) => {
          html +=
            `<div class="cart-row">` +
            `<div class="cart-ico">${escHtml(item.emoji)}</div>` +
            `<div class="cart-info">` +
            `<div class="cart-name">${escHtml(item.nom)}</div>` +
            `<div class="cart-meta">Taille ${escHtml(item.taille)} · Qté ${item.qte}</div>` +
            `</div>` +
            `<div class="cart-price">${(item.prix * item.qte).toFixed(2)} €</div>` +
            `<button class="cart-del" onclick="removeFromCart(${i})" aria-label="Supprimer">✕</button>` +
            `</div>`;
        });
        html += `</div>`;
        html +=
          `<div class="cart-foot">` +
          `<div class="cart-total-row">` +
          `<span class="cart-total-lbl">Total</span>` +
          `<span class="cart-total-amt">${cartTotal().toFixed(2)} €</span>` +
          `</div>` +
          `<button class="btn-clear" onclick="clearCart()">Vider le panier</button>` +
          `</div>`;

        el.innerHTML = html;
      }

      let _toastTimer;
      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("on");
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => el.classList.remove("on"), 2200);
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      loadCatalog();
    </script>
  </body>
</html>
