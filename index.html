<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'none';
      script-src  'self' https://telegram.org 'unsafe-inline';
      style-src   'self' 'unsafe-inline';
      connect-src 'self';
      img-src     'self' data:;
      frame-src   'none';
      object-src  'none';
    "
    />

    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="no-referrer" />

    <title>Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #fff;
        --surface: #f5f5f5;
        --border: #ddd;
        --text: #000;
        --text-sub: #666;
      }

      html,
      body {
        height: 100%;
      }
      body {
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><defs><pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="%2385f15d" stroke-width="0.5" opacity="0.08"/><circle cx="30" cy="30" r="2" fill="%2385f15d" opacity="0.04"/></pattern></defs><rect width="100%" height="100%" fill="%23fafaf9"/><rect width="100%" height="100%" fill="url(%23grid)"/></svg>');
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        -webkit-tap-highlight-color: transparent;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 500px;
        margin: 0 auto;
      }

      .pages {
        margin: 35% 2% 0 2%;
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      .pg {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .pg.active {
        flex-direction: column;
        display: flex;
        gap: 4%;
        opacity: 1;
        pointer-events: auto;
      }

      .home-hero {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
      }

      .product {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }

      .nbProduit {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 5px;
        font-weight: 500;
        padding: 2px 7px;
        border-radius: 20px;
        border: solid 1px;
      }

      .divCatContain {
        display: flex;
        flex-direction: row;
        gap: 5%;
        padding: 0 10px;
      }

      .divCat {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        flex: 1;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .home-h1 {
        font-size: 24px;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .home-sub {
        font-size: 12px;
        color: var(--text-sub);
      }

      .cat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 10px;
      }

      .cat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        cursor: pointer;
        transition: background 0.15s;
      }

      .cat-img-wrap {
        width: 100%;
        height: 70%;
        overflow: hidden;
        flex-shrink: 0;
        position: relative;
      }

      .cat-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 10px 10px 0 0;
      }

      .cat-cat {
        position: absolute;
        bottom: 6px;
        left: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px;
        font-size: 10px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border-radius: 10px;
        backdrop-filter: blur(4px);
      }

      .cat-name {
        font-size: 16px;
        font-weight: 500;
        padding: 6px 8px;
        flex-shrink: 0;
        line-height: 1.2;
      }

      .cat-farm {
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px 6px 8px;
        color: #555;
        flex-shrink: 0;
      }

      .nav {
        background: #1c2118;
        border-top: 1px solid #2a3025;
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 10px 8px calc(10px + env(safe-area-inset-bottom, 0px));
        flex-shrink: 0;
      }

      .nav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      .nav-btn span {
        font-size: 11px;
        font-weight: 500;
        color: #555;
        transition: color 0.2s;
      }

      .nav-btn.active span {
        color: #4ade4a;
      }

      .nav-ico-wrap {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        transition: all 0.2s;
      }

      .nav-btn svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: #555;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.2s;
      }

      .nav-btn.active .nav-ico-wrap {
        background: #4ade4a;
        width: 44px;
        height: 44px;
      }

      .nav-btn.active svg {
        stroke: #1c2118;
        width: 24px;
        height: 24px;
      }

      .nav-center-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        margin-top: -18px;
        -webkit-tap-highlight-color: transparent;
      }

      .nav-center-ring {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        border: 2px solid #3a4a35;
        background: #1c2118;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.2s;
        position: relative;
      }

      .nav-center-btn.active .nav-center-ring {
        border-color: #4ade4a;
      }

      .nav-center-btn svg {
        width: 26px;
        height: 26px;
        fill: none;
        stroke: #555;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.2s;
      }

      .nav-center-btn.active svg {
        stroke: #4ade4a;
      }

      .nav-center-btn span {
        font-size: 11px;
        font-weight: 600;
        color: #555;
        transition: color 0.2s;
      }

      .nav-center-btn.active span {
        color: #fff;
      }

      .nav-badge {
        position: absolute;
        top: -4px;
        right: -4px;
        background: var(--danger);
        color: white;
        font-size: 9px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .nav-badge.on {
        display: flex;
      }

      #navToast {
        position: fixed;
        bottom: 70px;
        left: 50%;
        transform: translateX(-50%) scale(0.9);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 8px 16px;
        font-size: 12px;
        border-radius: 20px;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
        z-index: 100;
      }
      #navToast.show {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="pages">
        <div class="pg active" id="pg-home">
          <div class="product">
            <div class="home-hero">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="30"
                height="30"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polygon
                  points="3 4 21 4 14 12 14 19 10 21 10 12 3 4"
                ></polygon>
              </svg>
              <h1 class="home-h1">Produits</h1>
            </div>
            <div class="nbProduit">
              <span></span>
              <p>Produits</p>
            </div>
          </div>
          <div class="divCatContain">
            <select
              id="catFilterSelect"
              class="divCat"
              onchange="filterCards()"
            >
              <option value="">Catégories</option>
            </select>
            <select
              id="farmFilterSelect"
              class="divCat"
              onchange="filterCards()"
            >
              <option value="">Farms</option>
            </select>
          </div>
          <div class="cat-grid" id="catGrid"></div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" id="nav-home" onclick="goHome()">
          <div class="nav-ico-wrap">
            <svg viewBox="0 0 24 24">
              <path d="M3 12L12 3l9 9" />
              <path d="M9 21V12h6v9" />
              <path d="M5 10v11h14V10" />
            </svg>
          </div>
          <span>Accueil</span>
        </button>

        <button class="nav-btn" id="nav-reviews" onclick="openReviews()">
          <div class="nav-ico-wrap">
            <svg viewBox="0 0 24 24">
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
              />
            </svg>
          </div>
          <span>Avis</span>
        </button>

        <button class="nav-center-btn" id="nav-cart" onclick="openCart()">
          <div class="nav-center-ring">
            <svg viewBox="0 0 24 24">
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path
                d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
              />
            </svg>
            <span class="nav-badge" id="navBadge"></span>
          </div>
          <span>Panier</span>
        </button>

        <button class="nav-btn" id="nav-info" onclick="openInfo()">
          <div class="nav-ico-wrap">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="8" stroke-width="2.5" />
              <line x1="12" y1="12" x2="12" y2="16" />
            </svg>
          </div>
          <span>Infos</span>
        </button>

        <button class="nav-btn" id="nav-contact" onclick="openContact()">
          <div class="nav-ico-wrap">
            <svg viewBox="0 0 24 24">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <polyline points="2,4 12,13 22,4" />
            </svg>
          </div>
          <span>Contact</span>
        </button>
      </nav>
    </div>

    <div id="navToast"></div>

    <script>
      let CATALOG = { categories: [] };

      async function loadCatalog() {
        try {
          const response = await fetch("articles.json");
          CATALOG = await response.json();
          renderHome();
        } catch (e) {
          console.error("Erreur chargement articles:", e);
          CATALOG = { categories: [] };
        }
      }

      function renderHome() {
        const g = document.getElementById("catGrid");
        g.innerHTML = "";
        CATALOG.categories.forEach((cat) => {
          const d = document.createElement("div");
          d.className = "cat-card";
          d.setAttribute("role", "button");
          d.setAttribute("tabindex", "0");
          d.setAttribute("data-categorie", cat.categorie);
          d.setAttribute("data-farm", cat.farm);
          d.innerHTML =
            `<div class="cat-img-wrap">
              <img class="cat-img" src="${cat.image}">
              <p class="cat-cat">
                  <svg xmlns="http://www.w3.org/2000/svg"
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    style="opacity:0.7;">
                    <path d="M20 13l-7 7-10-10V3h7z"/>
                    <circle cx="7" cy="7" r="1.5"/>
                </svg>
                ${cat.categorie}
              </p>
            </div>` +
            `<div class="cat-name">${escHtml(cat.nom)}</div>` +
            `<span class="cat-farm">
              <svg xmlns="http://www.w3.org/2000/svg"
                   width="20"
                   height="20"
                   viewBox="0 0 24 24"
                   fill="none"
                   stroke="currentColor"
                   stroke-width="1.6"
                   stroke-linecap="round"
                   stroke-linejoin="round"
                   style="opacity:0.7;">

                <path d="M3 10L12 4l9 6"/>
                <path d="M5 10v9h14v-9"/>
                <path d="M10 19v-5h4v5"/>

              </svg>
              ${cat.farm}
            </span>`;
          d.onclick = () => console.log("Catégorie: " + cat.id);
          g.appendChild(d);
        });

        const totalProducts = CATALOG.categories.length;
        const nbSpan = document.querySelector(".nbProduit span");
        if (nbSpan) nbSpan.textContent = totalProducts;

        populateFilters();
      }

      function populateFilters() {
        const categories = [
          ...new Set(CATALOG.categories.map((c) => c.categorie)),
        ];
        const farms = [...new Set(CATALOG.categories.map((c) => c.farm))];

        const catSelect = document.getElementById("catFilterSelect");
        const farmSelect = document.getElementById("farmFilterSelect");

        categories.forEach((cat) => {
          const option = document.createElement("option");
          option.value = cat;
          option.textContent = cat;
          catSelect.appendChild(option);
        });

        farms.forEach((farm) => {
          const option = document.createElement("option");
          option.value = farm;
          option.textContent = farm;
          farmSelect.appendChild(option);
        });
      }

      function filterCards() {
        const selectedCat = document.getElementById("catFilterSelect").value;
        const selectedFarm = document.getElementById("farmFilterSelect").value;
        const cards = document.querySelectorAll(".cat-card");

        cards.forEach((card) => {
          const cardCat = card.getAttribute("data-categorie");
          const cardFarm = card.getAttribute("data-farm");

          const showCat = !selectedCat || cardCat === selectedCat;
          const showFarm = !selectedFarm || cardFarm === selectedFarm;

          card.style.display = showCat && showFarm ? "flex" : "none";
        });
      }

      function goHome() {
        console.log("Retour à l'accueil");
      }

      function openCart() {
        showNavToast("Panier - Bientôt disponible");
      }

      function openInfo() {
        showNavToast("Section Info - Bientôt disponible");
      }

      function openContact() {
        showNavToast("Section Contact - Bientôt disponible");
      }

      function openReviews() {
        showNavToast("Section Avis - Bientôt disponible");
      }

      let navToastTimer;
      function showNavToast(msg) {
        const el = document.getElementById("navToast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(navToastTimer);
        navToastTimer = setTimeout(() => el.classList.remove("show"), 2000);
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      const tg = window.Telegram?.WebApp ?? null;
      if (tg) {
        tg.ready();
        tg.expand();
        try {
          tg.setHeaderColor("#ffffff");
        } catch (_) {}
        try {
          tg.setBackgroundColor("#ffffff");
        } catch (_) {}
      }

      loadCatalog();
    </script>
  </body>
</html>
